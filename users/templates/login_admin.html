{% extends 'base_login.html' %}

{% block title %}Login Administrativo{% endblock %}

{% block content %}
<div class="flex items-center justify-center h-full">
    <div class="w-full max-w-md bg-base-100 p-8 rounded-lg shadow-lg">
        <h2 class="text-2xl font-bold mb-2 text-center">Acceso Administrativo</h2>
        <p class="text-sm text-gray-500 mb-6 text-center">Ingrese su ID de empleado y contraseña.</p>

        {% if messages %}
            <div class="mb-4 space-y-2">
                {% for message in messages %}
                    <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                        <span>{{ message }}</span>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="post" action="{% url 'admin_login' %}">
            {% csrf_token %}
            <div class="mb-4">
                <label for="ID_empleado" class="block text-gray-700 mb-2">ID_empleado</label>
                <input
                    type="text"
                    name="ID_empleado"
                    id="ID_empleado"
                    maxlength="4"
                    pattern="\d{4}"
                    class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring focus:border-blue-300"
                    placeholder="Ej: 1234"
                    required
                >
            </div>
            <div class="mb-6">
                <label for="password" class="block text-gray-700 mb-2">Contraseña</label>
                <input
                    type="password"
                    name="password"
                    id="password"
                    class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring focus:border-blue-300"
                    required
                >
            </div>

            <button type="submit" class="w-full bg-primary text-white py-2 rounded hover:bg-primary-focus transition duration-200">Ingresar como administrador</button>
        </form>
    </div>
</div>
{% endblock %}
