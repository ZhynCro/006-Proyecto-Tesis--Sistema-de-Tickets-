{% extends 'base_login.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="flex items-center justify-center h-full">
<div class="w-full max-w-md bg-base-100 p-8 rounded-lg shadow-lg">
    <h2 class="text-2xl font-bold mb-6 text-center">Iniciar Sesión</h2>
    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="mb-4">
            <label for="username" class="block text-gray-700 mb-2">Usuario</label>
            <input type="text" name="username" id="username" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring focus:border-blue-300" required>
        </div>
        <div class="mb-6">
            <label for="password" class="block text-gray-700 mb-2">Contraseña</label>
            <input type="password" name="password" id="password" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring focus:border-blue-300" required>
        </div>
        <button type="submit" class="w-full bg-primary text-white py-2 rounded hover:bg-primary-focus transition duration-200">Ingresar</button>
    </form>
</div>
{% endblock %}
