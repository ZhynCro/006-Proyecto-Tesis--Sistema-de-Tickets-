{% load tailwind_tags %}
{% load static %}
<!DOCTYPE html>
<html lang="es" data-theme="light"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Tickets - Tesis</title>
    {% tailwind_css %}
</head>
<body class="bg-base-200 min-h-screen">

    <div class="navbar bg-base-100 shadow-lg">
        <div class="flex-1">
            <a class="btn btn-ghost normal-case text-xl text-primary">TicketSystem</a>
        </div>
        <div class="flex-none">
            <button class="btn btn-square btn-ghost">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-5 h-5 stroke-current"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"></path></svg>
            </button>
        </div>
    </div>

    <main class="p-8">
        {% block content %}
        <div class="text-center">
            <h1 class="text-3xl font-bold">¡Conexión Exitosa!</h1>
            <p class="py-6">Si ves este botón con estilo, Tailwind y DaisyUI están vivos.</p>
            <button class="btn btn-primary">Botón de Prueba</button>
        </div>
        {% endblock content %}
    </main>

</body>
</html>
